<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Swapnil Katuwal | SOC Analyst Portfolio</title>
  <desc id="desc">Open Graph card for Swapnil Katuwal cybersecurity portfolio website.</desc>

  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.2"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-opacity="0.28"/>
    </pattern>
    <filter id="blurGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgMain)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <circle cx="1025" cy="85" r="210" fill="#3b82f6" fill-opacity="0.16" filter="url(#blurGlow)"/>
  <circle cx="140" cy="545" r="190" fill="#22d3ee" fill-opacity="0.12" filter="url(#blurGlow)"/>

  <rect x="64" y="62" width="1072" height="506" rx="24" fill="#0f1729" fill-opacity="0.84" stroke="#334155" stroke-opacity="0.5"/>
  <rect x="64" y="62" width="1072" height="4" rx="2" fill="url(#edge)"/>

  <g>
    <rect x="108" y="122" width="192" height="44" rx="22" fill="url(#pill)" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="132" y="151" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">SOC ANALYST</text>
  </g>

  <text x="108" y="250" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800">Swapnil Katuwal</text>
  <text x="108" y="305" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">Threat Detection, SIEM Operations, Incident Response</text>

  <g>
    <rect x="108" y="346" width="492" height="58" rx="14" fill="#0b1220" stroke="#334155"/>
    <text x="134" y="383" fill="#67e8f9" font-family="Consolas, 'Courier New', monospace" font-size="24">$ monitor --triage --respond</text>
  </g>

  <text x="108" y="510" fill="#60a5fa" font-family="Consolas, 'Courier New', monospace" font-size="26">swapnilkatuwal.vercel.app</text>

  <g>
    <rect x="854" y="430" width="238" height="96" rx="16" fill="#0b1220" stroke="#22d3ee" stroke-opacity="0.36"/>
    <text x="878" y="468" fill="#22d3ee" font-family="Consolas, 'Courier New', monospace" font-size="20" font-weight="700">CYBERSECURITY</text>
    <text x="878" y="498" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Portfolio Website</text>
  </g>
</svg>
